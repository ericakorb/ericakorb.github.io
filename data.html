<main>

  <!-- Dataset info -->
  <div class="card" id="info-card">
    <h2 class="card-title">Dataset</h2>
    <div class="dataset-row">
      <div class="dataset-meta">
        <select id="dataset-select" aria-label="Select a dataset">
          <option value="" disabled selected>Select a dataset…</option>
        </select>
        <span id="dataset-desc"></span>
        <span id="dataset-organism" class="dataset-organism" style="display:none"></span>
        <span id="dataset-citation" class="dataset-citation" style="display:none"></span>
        <div id="dl-csv-row" class="omi-hidden">
          <button class="btn btn-secondary btn-sm" id="dl-csv"><span aria-hidden="true">⬇</span> Download Full Dataset (CSV)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Gene search -->
  <div class="card omi-hidden" id="search-section">
    <h2 class="card-title">Gene Search <span id="search-organism" class="search-organism"></span></h2>
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input
        id="gene-input"
        type="text"
        placeholder="Type a gene symbol — select multiple"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search gene symbols"
        aria-autocomplete="list"
        aria-controls="search-results"
        aria-expanded="false"
      >
      <div id="search-results" class="omi-hidden" role="listbox" aria-label="Gene search results"></div>
    </div>
    <div class="search-meta" id="gene-count" aria-live="polite"></div>

    <!-- Selected gene tags -->
    <div class="selected-genes-row">
      <div id="selected-genes" aria-label="Selected genes" aria-live="polite">
        <span class="no-genes-hint">Search and select genes above</span>
      </div>
      <button class="btn btn-ghost btn-sm omi-hidden" id="clear-genes">Clear all</button>
    </div>
  </div>

  <!-- Charts -->
  <div class="omi-hidden" id="chart-section">
    <div id="plots-container" class="plots-grid"></div>
  </div>

  <!-- Downloads -->
  <div class="card omi-hidden" id="download-section">
    <h2 class="card-title">Downloads</h2>
    <div class="download-grid">
      <button class="btn btn-secondary" id="dl-gene-csv" disabled><span aria-hidden="true">⬇</span> Selected Genes (CSV)</button>
      <button class="btn btn-secondary" id="dl-all-png" disabled><span aria-hidden="true">⬇</span> All Plots (PNG)</button>
      <button class="btn btn-secondary" id="dl-all-svg" disabled><span aria-hidden="true">⬇</span> All Plots (SVG)</button>
    </div>
  </div>

</main>
